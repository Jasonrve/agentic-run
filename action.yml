name: agentic-run
description: Call Bifrost with a prompt, render a well-formatted Markdown report, and optionally upsert it as a PR comment.

inputs:
  prompt:
    description: Primary instruction for the LLM.
    required: true
  context:
    description: Optional additional context to include with the prompt.
    required: false
    default: ""
  bifrost_base_url:
    description: OpenAI-compatible Bifrost base URL.
    required: false
    default: https://bifrost.workside.win/v1
  bifrost_api_key:
    description: Bifrost API key.
    required: true
  github_token:
    description: GitHub token used to upsert PR comments.
    required: false
    default: ${{ github.token }}
  model:
    description: Model name to use.
    required: false
    default: openai/gpt-4o-mini
  pr_number:
    description: Pull request number to comment on. Defaults to the current PR context when available.
    required: false
    default: ""
  post_comment:
    description: Whether to upsert a PR comment.
    required: false
    default: "true"
  fail_on_findings:
    description: Fail the step when the generated report contains findings or a non-pass verdict.
    required: false
    default: "false"
  comment_marker:
    description: Stable HTML marker used to update one comment instead of spamming duplicates.
    required: false
    default: "<!-- agentic-run -->"
  dry_run:
    description: Skip posting a PR comment and only emit outputs.
    required: false
    default: "false"
  mock_response_file:
    description: Optional path to a file containing a raw OpenAI-style response payload for validation.
    required: false
    default: ""
  context_mode:
    description: Context strategy to use. diff, full, hybrid, or agentic.
    required: false
    default: diff
  extra_context_paths:
    description: Comma or newline separated list of file paths to always include.
    required: false
    default: ""
  max_file_chars:
    description: Maximum characters to load per file.
    required: false
    default: "12000"
  max_follow_up_rounds:
    description: Maximum number of additional file-request rounds in agentic mode.
    required: false
    default: "1"

outputs:
  verdict:
    description: The parsed verdict from the model.
  finding_count:
    description: Number of findings in the report.
  comment_body:
    description: Rendered Markdown comment body.
  comment_url:
    description: URL of the upserted PR comment, if any.

runs:
  using: node24
  main: dist/index.js
